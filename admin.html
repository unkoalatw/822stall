<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com https://www.googletagmanager.com; img-src 'self' data: blob: *; worker-src 'self' blob: *; connect-src 'self' https://script.google.com https://script.googleusercontent.com;">
  
  <title>園遊會後台管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbySm6lzRRBA30Ga0qQN_I4mi0szqMXQNwKzTJmfwRLVeree-A_VqDGudrmRTu7wUGc2/exec';

    document.addEventListener('alpine:init', () => {
      Alpine.data('adminApp', () => ({
        activeTab: 'orders', 
        orders: [], 
        products: [],
        stats: { totalOrders: 0, totalRevenue: 0, paidRevenue: 0 }, 
        loading: true,
        submitting: false,
        showProductModal: false,
        isEditing: false,
        productForm: { id: '', name: '', price: 0, description: '', category: '熱食', stock: 100, customCategory: '' },
        defaultCategories: ['熱食', '飲品', '點心', '遊戲', '其他'],

        async init() { await this.refresh(); },

        async refresh() {
          this.loading = true;
          try {
            const res = await fetch(`${API_URL}?action=getAppData`);
            const json = await res.json();
            if (json.status === 'success') {
              this.orders = json.data.orders || [];
              this.products = json.data.products || [];
            }
            const sRes = await fetch(`${API_URL}?action=getSalesStats`);
            this.stats = (await sRes.json()).data || { totalOrders: 0, totalRevenue: 0, paidRevenue: 0 };
          } catch (err) { console.error("資料讀取失敗:", err); } 
          finally { this.loading = false; }
        },

        openAddModal() {
          this.isEditing = false;
          this.productForm = { id: '', name: '', price: 0, description: '', category: '熱食', stock: 100, customCategory: '' };
          this.showProductModal = true;
        },

        openEditModal(p) {
          this.isEditing = true;
          const isDefault = this.defaultCategories.includes(p.category);
          this.productForm = { ...p, category: isDefault ? p.category : '自定義', customCategory: isDefault ? '' : p.category };
          this.showProductModal = true;
        },

        async deleteProduct(id) {
          if (!confirm('確定要刪除此商品嗎？此操作不可恢復。')) return;
          this.submitting = true;
          try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'deleteProduct', id: id }) });
            setTimeout(() => this.refreshAndStopSubmitting(), 1200);
          } catch (err) { this.submitting = false; }
        },

        async saveProduct() {
          if (!this.productForm.name || this.productForm.price < 0) { alert("請填寫正確資訊"); return; }
          let finalCategory = this.productForm.category === '自定義' ? (this.productForm.customCategory || '未分類') : this.productForm.category;
          const payload = { action: this.isEditing ? 'updateProduct' : 'addProduct', data: { ...this.productForm, category: finalCategory } };
          this.submitting = true;
          try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            this.showProductModal = false;
            setTimeout(() => this.refreshAndStopSubmitting(), 1200);
          } catch (err) { this.submitting = false; }
        },

        async updateStatus(id, status) {
          this.submitting = true;
          try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'updateOrderStatus', orderId: id, newStatus: status }) });
            setTimeout(() => this.refreshAndStopSubmitting(), 1200);
          } catch (err) { this.submitting = false; }
        },

        refreshAndStopSubmitting() {
          this.refresh();
          this.submitting = false;
        }
      }));
    });
  </script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .loading-bar { height: 4px; background: #3b82f6; animation: barProgress 1.5s infinite ease-in-out; }
    @keyframes barProgress { 0% { width: 0%; } 100% { width: 100%; } }
  </style>
</head>
<body class="bg-slate-100 p-4 md:p-8" x-data="adminApp" x-cloak>
  <!-- 加載動畫 -->
  <div x-show="submitting" class="fixed top-0 left-0 w-full z-[100]">
    <div class="loading-bar"></div>
    <div class="absolute inset-0 bg-white/60 backdrop-blur-sm h-screen flex flex-col items-center justify-center">
       <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
       <p class="font-bold text-blue-600">正在同步雲端資料庫...</p>
    </div>
  </div>

  <div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter">園遊會管理面板</h1>
        <p class="text-slate-400 text-sm font-medium">822 班級管理後台</p>
      </div>
      <div class="flex gap-3">
        <button @click="openAddModal" class="bg-blue-600 text-white px-5 py-2.5 rounded-2xl hover:bg-blue-700 transition shadow-xl shadow-blue-100 font-bold text-sm">＋ 新增商品</button>
        <button @click="refresh" class="bg-white border border-slate-200 px-5 py-2.5 rounded-2xl text-slate-600 hover:bg-slate-50 transition flex items-center gap-2 shadow-sm font-bold text-sm" :disabled="loading">
          <svg x-show="loading" class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
          刷新數據
        </button>
      </div>
    </div>

    <!-- 數據概覽 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">總訂單 Order Count</p>
        <p class="text-4xl font-black mt-2 text-slate-800" x-text="stats.totalOrders"></p>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
        <p class="text-blue-400 text-xs font-bold uppercase tracking-widest">預估總額 Est. Revenue</p>
        <p class="text-4xl font-black mt-2 text-blue-600" x-text="'$' + stats.totalRevenue"></p>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
        <p class="text-emerald-400 text-xs font-bold uppercase tracking-widest">已實收 Collected</p>
        <p class="text-4xl font-black mt-2 text-emerald-600" x-text="'$' + stats.paidRevenue"></p>
      </div>
    </div>

    <!-- 切換標籤 -->
    <div class="mb-8 flex gap-8 border-b border-slate-200">
      <button @click="activeTab = 'orders'" class="pb-4 px-1 font-black transition-all border-b-4 text-sm" :class="activeTab === 'orders' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-500'">訂單管理 (ORDERS)</button>
      <button @click="activeTab = 'products'" class="pb-4 px-1 font-black transition-all border-b-4 text-sm" :class="activeTab === 'products' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-500'">品項配置 (PRODUCTS)</button>
    </div>

    <!-- 列表內容 -->
    <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden mb-12">
      <!-- 訂單列表 -->
      <div x-show="activeTab === 'orders'">
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-100">
              <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <th class="p-6">訂購人 / 資訊</th>
                <th class="p-6">購買內容</th>
                <th class="p-6">應收</th>
                <th class="p-6">當前狀態</th>
                <th class="p-6 text-right">管理操作</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
              <template x-for="o in orders" :key="o.id">
                <tr class="hover:bg-slate-50/50 transition-colors">
                  <td class="p-6">
                    <p class="font-black text-slate-800" x-text="o.name"></p>
                    <p class="text-[10px] text-slate-400 font-bold mt-1 uppercase tracking-tighter">
                      <span x-text="o.class"></span>班 <span x-show="o.identity==='student'" x-text="o.seat+'號'"></span>
                      <span class="ml-1 px-1 bg-slate-100 rounded" x-text="o.identity === 'teacher' ? '老師' : '學生'"></span>
                    </p>
                  </td>
                  <td class="p-6">
                    <template x-for="i in o.items"><span class="inline-block bg-blue-50 text-blue-700 rounded-lg px-2 py-1 mr-1 mb-1 border border-blue-100 text-[10px] font-bold" x-text="i.name + ' x' + i.quantity"></span></template>
                  </td>
                  <td class="p-6 font-black text-slate-900" x-text="'$' + o.total"></td>
                  <td class="p-6">
                    <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-wider inline-block" 
                          :class="{
                            'bg-amber-100 text-amber-600': o.status === 'pending',
                            'bg-emerald-100 text-emerald-600': o.status === 'paid',
                            'bg-blue-100 text-blue-600': o.status === 'completed',
                            'bg-red-100 text-red-600': o.status === 'cancelled'
                          }" x-text="o.status === 'pending' ? '待付款' : (o.status === 'paid' ? '已收款' : (o.status === 'cancelled' ? '已取消' : '完成'))"></span>
                    <p x-show="o.cancelReason" class="text-[9px] text-red-400 mt-1 italic font-medium" x-text="'原因：' + o.cancelReason"></p>
                  </td>
                  <td class="p-6 text-right">
                    <button x-show="o.status === 'pending'" @click="updateStatus(o.id, 'paid')" class="bg-emerald-500 text-white text-[10px] px-4 py-2 rounded-xl font-black shadow-lg shadow-emerald-50 transition hover:bg-emerald-600">確認收款</button>
                    <span x-show="o.status !== 'pending'" class="text-slate-300 text-[10px] font-bold italic">N/A</span>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>

      <!-- 商品列表 -->
      <div x-show="activeTab === 'products'" x-cloak>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-100">
              <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <th class="p-6">商品名稱</th>
                <th class="p-6">分類</th>
                <th class="p-6">售價</th>
                <th class="p-6">庫存</th>
                <th class="p-6 text-right">管理</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
              <template x-for="p in products" :key="p.id">
                <tr class="hover:bg-slate-50/50 transition-colors">
                  <td class="p-6">
                    <p class="font-black text-slate-800" x-text="p.name"></p>
                    <p class="text-[10px] text-slate-400" x-text="p.description"></p>
                  </td>
                  <td class="p-6"><span class="bg-slate-100 text-slate-600 px-2 py-1 rounded-lg text-[10px] font-black uppercase" x-text="p.category"></span></td>
                  <td class="p-6 font-black text-blue-600 text-lg" x-text="'$' + p.price"></td>
                  <td class="p-6 font-mono font-bold text-slate-400" x-text="p.stock"></td>
                  <td class="p-6 text-right space-x-3">
                    <button @click="openEditModal(p)" class="text-blue-500 hover:text-blue-700 text-[11px] font-black underline">編輯</button>
                    <button @click="deleteProduct(p.id)" class="text-red-400 hover:text-red-600 text-[11px] font-black underline">刪除</button>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 編輯商品 Modal -->
  <div x-show="showProductModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[150] p-4" x-transition.opacity x-cloak>
    <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl" @click.away="showProductModal = false">
      <h3 class="text-3xl font-black mb-1 text-slate-800 tracking-tighter" x-text="isEditing ? '修改內容' : '新增品項'"></h3>
      <p class="text-xs text-slate-400 mb-8 font-bold uppercase tracking-widest">Update your fair menu items</p>
      
      <div class="space-y-5">
        <input type="text" x-model="productForm.name" placeholder="商品名稱" class="w-full border border-slate-200 rounded-2xl p-4 text-sm outline-none focus:ring-2 focus:ring-blue-600 font-bold bg-slate-50/50">
        <div class="grid grid-cols-2 gap-4">
          <input type="number" x-model="productForm.price" placeholder="價格" class="w-full border border-slate-200 rounded-2xl p-4 text-sm font-bold bg-slate-50/50">
          <input type="number" x-model="productForm.stock" placeholder="庫存" class="w-full border border-slate-200 rounded-2xl p-4 text-sm font-bold bg-slate-50/50">
        </div>
        <select x-model="productForm.category" class="w-full border border-slate-200 rounded-2xl p-4 bg-slate-50/50 text-sm font-bold">
          <template x-for="cat in defaultCategories"><option :value="cat" x-text="cat"></option></template>
          <option value="自定義">＋ 自定義分類</option>
        </select>
        <input x-show="productForm.category === '自定義'" type="text" x-model="productForm.customCategory" placeholder="新分類名稱" class="w-full border border-blue-200 rounded-2xl p-4 text-sm bg-blue-50/30 font-bold">
        <textarea x-model="productForm.description" placeholder="簡短描述" rows="3" class="w-full border border-slate-200 rounded-2xl p-4 text-sm font-bold bg-slate-50/50"></textarea>
      </div>
      <div class="mt-10 flex gap-4">
        <button @click="showProductModal = false" class="flex-1 px-4 py-4 rounded-2xl text-slate-400 font-bold text-sm hover:bg-slate-50 transition">取消</button>
        <button @click="saveProduct" class="flex-1 bg-blue-600 text-white px-4 py-4 rounded-2xl font-black shadow-xl shadow-blue-100 text-sm hover:bg-blue-700 transition">儲存生效</button>
      </div>
    </div>
  </div>
</body>
</html>
