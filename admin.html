<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com https://www.googletagmanager.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: *; worker-src 'self' blob: *; connect-src 'self' https://script.google.com https://script.googleusercontent.com;">
  
  <title>園遊會後台管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbySm6lzRRBA30Ga0qQN_I4mi0szqMXQNwKzTJmfwRLVeree-A_VqDGudrmRTu7wUGc2/exec';

    document.addEventListener('alpine:init', () => {
      Alpine.data('adminApp', () => ({
        activeTab: 'orders', 
        orders: [], 
        products: [],
        stats: { totalOrders: 0, totalRevenue: 0, paidRevenue: 0 }, 
        loading: true,
        submitting: false,
        showProductModal: false,
        isEditing: false,
        productForm: { id: '', name: '', price: 0, description: '', category: '熱食', stock: 100, customCategory: '' },
        defaultCategories: ['熱食', '飲品', '點心', '遊戲', '其他'],
        
        // 收據預覽
        showReceiptModal: false,
        activeReceipt: null,

        async init() { await this.refresh(); },

        async refresh() {
          this.loading = true;
          try {
            const res = await fetch(`${API_URL}?action=getAppData`);
            const json = await res.json();
            if (json.status === 'success') {
              this.orders = json.data.orders || [];
              this.products = json.data.products || [];
            }
            const sRes = await fetch(`${API_URL}?action=getSalesStats`);
            this.stats = (await sRes.json()).data || { totalOrders: 0, totalRevenue: 0, paidRevenue: 0 };
          } catch (err) { console.error("資料讀取失敗:", err); } 
          finally { this.loading = false; }
        },

        openAddModal() {
          this.isEditing = false;
          this.productForm = { id: '', name: '', price: 0, description: '', category: '熱食', stock: 100, customCategory: '' };
          this.showProductModal = true;
        },

        openEditModal(p) {
          this.isEditing = true;
          const isDefault = this.defaultCategories.includes(p.category);
          this.productForm = { ...p, category: isDefault ? p.category : '自定義', customCategory: isDefault ? '' : p.category };
          this.showProductModal = true;
        },

        async deleteProduct(id) {
          if (!confirm('確定要刪除此商品嗎？')) return;
          this.submitting = true;
          try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'deleteProduct', id: id }) });
            setTimeout(() => { this.refresh(); this.submitting = false; }, 1200);
          } catch (err) { this.submitting = false; }
        },

        async saveProduct() {
          let finalCategory = this.productForm.category === '自定義' ? (this.productForm.customCategory || '未分類') : this.productForm.category;
          const payload = { action: this.isEditing ? 'updateProduct' : 'addProduct', data: { ...this.productForm, category: finalCategory } };
          this.submitting = true;
          try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            this.showProductModal = false;
            setTimeout(() => { this.refresh(); this.submitting = false; }, 1200);
          } catch (err) { this.submitting = false; }
        },

        async updateStatus(id, status) {
          this.submitting = true;
          try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'updateOrderStatus', orderId: id, newStatus: status }) });
            setTimeout(() => { this.refresh(); this.submitting = false; }, 1200);
          } catch (err) { this.submitting = false; }
        },

        viewReceipt(order) {
          this.activeReceipt = order;
          this.showReceiptModal = true;
        },

        downloadPDF() {
          const element = document.getElementById('admin-print-receipt');
          const opt = {
            margin: 1,
            filename: `Admin_Receipt_${this.activeReceipt.id}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
          };
          html2pdf().set(opt).from(element).save();
        }
      }));
    });
  </script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .loading-bar { height: 4px; background: #3b82f6; animation: barProgress 1.5s infinite ease-in-out; }
    @keyframes barProgress { 0% { width: 0%; } 100% { width: 100%; } }
    @media print {
      body * { visibility: hidden !important; }
      #admin-print-receipt, #admin-print-receipt * { visibility: visible !important; }
      #admin-print-receipt { position: absolute; left: 0; top: 0; width: 100% !important; }
    }
  </style>
</head>
<body class="bg-slate-100 p-4 md:p-8" x-data="adminApp" x-cloak>
  <!-- 加載動畫 -->
  <div x-show="submitting" class="fixed inset-0 z-[150]">
    <div class="loading-bar w-full absolute top-0 left-0"></div>
    <div class="absolute inset-0 bg-white/60 backdrop-blur-sm flex flex-col items-center justify-center">
       <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
       <p class="font-bold text-blue-600">正在處理...</p>
    </div>
  </div>

  <div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
      <h1 class="text-3xl font-black text-slate-800">園遊會管理</h1>
      <div class="flex gap-2">
        <button @click="openAddModal" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold">＋ 新增商品</button>
        <button @click="refresh" class="bg-white border p-2 rounded-xl text-slate-400">刷新</button>
      </div>
    </div>

    <!-- 數據概覽 (代碼省略以保持精簡) -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><p class="text-xs text-slate-400 font-bold">總訂單</p><p class="text-3xl font-black" x-text="stats.totalOrders"></p></div>
      <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><p class="text-xs text-blue-400 font-bold">預估營收</p><p class="text-3xl font-black text-blue-600" x-text="'$' + stats.totalRevenue"></p></div>
      <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><p class="text-xs text-emerald-400 font-bold">已收款</p><p class="text-3xl font-black text-emerald-600" x-text="'$' + stats.paidRevenue"></p></div>
    </div>

    <div class="mb-8 flex gap-8 border-b">
      <button @click="activeTab = 'orders'" class="pb-4 font-black text-sm transition" :class="activeTab === 'orders' ? 'border-b-4 border-blue-600 text-blue-600' : 'text-slate-400'">訂單管理</button>
      <button @click="activeTab = 'products'" class="pb-4 font-black text-sm transition" :class="activeTab === 'products' ? 'border-b-4 border-blue-600 text-blue-600' : 'text-slate-400'">商品配置</button>
    </div>

    <div class="bg-white rounded-[2rem] shadow-sm border overflow-hidden">
      <!-- 訂單列表 -->
      <div x-show="activeTab === 'orders'">
        <table class="w-full text-left">
          <thead class="bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase tracking-widest">
            <tr><th class="p-6">訂購人</th><th class="p-6">購買內容</th><th class="p-6">金額</th><th class="p-6">狀態</th><th class="p-6 text-right">操作</th></tr>
          </thead>
          <tbody class="divide-y text-sm">
            <template x-for="o in orders" :key="o.id">
              <tr class="hover:bg-slate-50 transition-colors">
                <td class="p-6">
                  <p class="font-black" x-text="o.name"></p>
                  <p class="text-[10px] text-slate-400" x-text="o.class + '班 ' + (o.seat ? o.seat+'號' : '(老師)')"></p>
                </td>
                <td class="p-6">
                  <template x-for="i in o.items"><span class="inline-block bg-blue-50 text-blue-700 rounded px-1.5 py-0.5 mr-1 mb-1 border border-blue-100 text-[10px] font-bold" x-text="i.name + 'x' + i.quantity"></span></template>
                </td>
                <td class="p-6 font-black" x-text="'$' + o.total"></td>
                <td class="p-6">
                  <span class="px-2 py-0.5 rounded-full text-[9px] font-black uppercase" :class="{ 'bg-amber-100 text-amber-600': o.status === 'pending', 'bg-emerald-100 text-emerald-600': o.status === 'paid', 'bg-red-100 text-red-600': o.status === 'cancelled' }" x-text="o.status"></span>
                </td>
                <td class="p-6 text-right space-x-2">
                  <button @click="viewReceipt(o)" class="text-blue-600 font-bold underline text-xs">查看收據</button>
                  <button x-show="o.status === 'pending'" @click="updateStatus(o.id, 'paid')" class="bg-emerald-500 text-white text-[10px] px-3 py-1.5 rounded-lg font-black transition">收款</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <!-- 商品列表 (略) -->
      <div x-show="activeTab === 'products'" class="p-6">
         <table class="w-full text-left">
            <template x-for="p in products" :key="p.id">
              <tr class="border-b">
                 <td class="py-4 font-bold" x-text="p.name"></td>
                 <td class="py-4 text-right">
                    <button @click="openEditModal(p)" class="text-blue-500 underline mr-3">編輯</button>
                    <button @click="deleteProduct(p.id)" class="text-red-500 underline">刪除</button>
                 </td>
              </tr>
            </template>
         </table>
      </div>
    </div>
  </div>

  <!-- 後台收據彈窗 (管理員用) -->
  <div x-show="showReceiptModal" x-transition class="fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center z-[200] p-4 no-print" x-cloak>
    <div @click.away="showReceiptModal = false" class="bg-white rounded-3xl w-full max-w-sm flex flex-col shadow-2xl overflow-hidden">
      <div class="flex-1 overflow-y-auto p-6 bg-white">
        <div id="admin-print-receipt" class="bg-white p-6 border-2 border-slate-200 border-dashed relative">
          <h2 class="text-center font-black text-2xl tracking-tighter text-slate-800 mb-1">822 園遊會收據</h2>
          <p class="text-center text-[10px] text-slate-400 mb-8 font-black uppercase tracking-widest">Admin Copy</p>
          <div class="text-xs space-y-2 mb-8 border-b pb-6 font-bold text-slate-600">
            <div class="flex justify-between"><span>單號 ID</span><span class="font-mono text-blue-600" x-text="activeReceipt?.id"></span></div>
            <div class="flex justify-between"><span>姓名 Name</span><span x-text="activeReceipt?.name" class="text-slate-800"></span></div>
            <div class="flex justify-between"><span>班級 Class</span><span x-text="activeReceipt?.class + ' 班 ' + (activeReceipt?.seat ? activeReceipt?.seat + ' 號' : '')"></span></div>
            <div class="flex justify-between"><span>時間 Time</span><span x-text="activeReceipt?.timestamp" class="text-slate-400"></span></div>
          </div>
          <div class="space-y-2 mb-8">
            <template x-for="i in activeReceipt?.items"><div class="flex justify-between text-sm font-black italic"><span x-text="i.name + ' x ' + i.quantity"></span><span x-text="'$' + i.price*i.quantity"></span></div></template>
          </div>
          <div class="border-t-2 border-slate-800 pt-4 flex justify-between items-center mb-8">
            <span class="text-xs font-black opacity-40">總額 Total</span>
            <span class="font-black text-3xl text-blue-600" x-text="'$' + activeReceipt?.total"></span>
          </div>
          <p class="text-center text-[10px] text-slate-300 font-bold uppercase">Pickup requires this voucher</p>
        </div>
      </div>
      <div class="p-6 bg-slate-50 flex flex-col gap-3 no-print border-t">
        <div class="grid grid-cols-2 gap-3">
          <button @click="window.print()" class="py-3 bg-blue-600 text-white rounded-xl font-black text-sm">列印</button>
          <button @click="downloadPDF()" class="py-3 bg-emerald-600 text-white rounded-xl font-black text-sm">下載 PDF</button>
        </div>
        <button @click="showReceiptModal = false" class="py-3 bg-white border rounded-xl font-bold text-slate-400 text-sm">關閉</button>
      </div>
    </div>
  </div>

  <!-- 商品 Modal (代碼省略以保持精簡，內容與之前相同) -->
  <div x-show="showProductModal" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-[150]" x-cloak>
      <div class="bg-white rounded-3xl p-10 max-w-md w-full shadow-2xl">
         <h3 class="text-2xl font-black mb-6" x-text="isEditing ? '修改商品' : '新增商品'"></h3>
         <div class="space-y-4">
            <input type="text" x-model="productForm.name" placeholder="商品名稱" class="w-full border p-4 rounded-2xl font-bold bg-slate-50/50">
            <div class="grid grid-cols-2 gap-4">
               <input type="number" x-model="productForm.price" placeholder="價格" class="w-full border p-4 rounded-2xl font-bold">
               <input type="number" x-model="productForm.stock" placeholder="庫存" class="w-full border p-4 rounded-2xl font-bold">
            </div>
            <select x-model="productForm.category" class="w-full border p-4 rounded-2xl bg-slate-50/50">
               <template x-for="cat in defaultCategories"><option :value="cat" x-text="cat"></option></template>
               <option value="自定義">＋ 自定義</option>
            </select>
            <textarea x-model="productForm.description" placeholder="描述" class="w-full border p-4 rounded-2xl font-bold bg-slate-50/50"></textarea>
         </div>
         <div class="mt-8 flex gap-4">
            <button @click="showProductModal = false" class="flex-1 py-4 text-slate-400 font-bold">取消</button>
            <button @click="saveProduct" class="flex-1 py-4 bg-blue-600 text-white font-black rounded-2xl shadow-xl">儲存</button>
         </div>
      </div>
  </div>
</body>
</html>
