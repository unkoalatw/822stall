<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: *; connect-src 'self' https://script.google.com https://script.googleusercontent.com;">
  <title>園遊會商家管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbySm6lzRRBA30Ga0qQN_I4mi0szqMXQNwKzTJmfwRLVeree-A_VqDGudrmRTu7wUGc2/exec';

    document.addEventListener('alpine:init', () => {
      Alpine.data('adminApp', () => ({
        isLoggedIn: false,
        password: '',
        activeTab: 'orders',
        orders: [], products: [], stats: { totalOrders: 0, totalRevenue: 0, paidRevenue: 0, ranking: [] },
        loading: false, submitting: false,
        showProductModal: false, isEditing: false,
        productForm: { id: '', name: '', price: 0, description: '', category: '熱食', stock: 100, customCategory: '' },
        defaultCategories: ['熱食', '飲品', '點心', '遊戲', '其他'],
        showReceiptModal: false, activeReceipt: null,
        showCancelModal: false, cancelReason: '', targetOrder: null,

        async init() {
          const savedPass = sessionStorage.getItem('admin_pwd');
          if (savedPass) {
            this.password = savedPass;
            await this.tryLogin();
          }
        },

        async tryLogin() {
          this.loading = true;
          try {
            const res = await fetch(`${API_URL}?action=checkLogin&pwd=${encodeURIComponent(this.password)}`);
            const json = await res.json();
            if (json.status === 'success') {
              this.isLoggedIn = true;
              sessionStorage.setItem('admin_pwd', this.password);
              await this.refresh();
            } else {
              alert("密碼不正確");
              sessionStorage.removeItem('admin_pwd');
            }
          } catch (e) { alert("連線失敗"); }
          finally { this.loading = false; }
        },

        async refresh() {
          if (!this.isLoggedIn) return;
          this.loading = true;
          try {
            const res = await fetch(`${API_URL}?action=getAppData&pwd=${encodeURIComponent(this.password)}`);
            const json = await res.json();
            this.orders = json.data.orders;
            this.products = json.data.products;
            const sRes = await fetch(`${API_URL}?action=getSalesStats&pwd=${encodeURIComponent(this.password)}`);
            this.stats = (await sRes.json()).data;
          } finally { this.loading = false; }
        },

        async postAction(payload) {
          this.submitting = true;
          try {
            await fetch(API_URL, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify({ ...payload, pwd: this.password })
            });
            setTimeout(() => { this.refresh(); this.submitting = false; }, 1200);
          } catch (e) { this.submitting = false; }
        },

        async updateStatus(id, s) { await this.postAction({ action: 'updateOrderStatus', orderId: id, newStatus: s }); },
        async submitCancel() { 
          await this.postAction({ action: 'cancelOrder', orderId: this.targetOrder.id, reason: this.cancelReason });
          this.showCancelModal = false; this.cancelReason = '';
        },
        async saveProduct() {
          let cat = this.productForm.category === '自定義' ? this.productForm.customCategory : this.productForm.category;
          await this.postAction({ action: this.isEditing ? 'updateProduct' : 'addProduct', data: { ...this.productForm, category: cat } });
          this.showProductModal = false;
        },
        async deleteProduct(id) { if(confirm('確定刪除？')) await this.postAction({ action: 'deleteProduct', id }); },
        
        openAddModal() { this.isEditing = false; this.productForm = { id: '', name: '', price: 0, description: '', category: '熱食', stock: 100 }; this.showProductModal = true; },
        openEditModal(p) { this.isEditing = true; this.productForm = { ...p }; this.showProductModal = true; },
        viewReceipt(o) { this.activeReceipt = o; this.showReceiptModal = true; },
        downloadPDF() {
          const opt = { margin: 1, filename: `Receipt_${this.activeReceipt.id}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter' } };
          html2pdf().set(opt).from(document.getElementById('admin-print-receipt')).save();
        },
        logout() { sessionStorage.removeItem('admin_pwd'); location.reload(); }
      }));
    });
  </script>
  <style>
    [x-cloak] { display: none !important; }
    .loading-bar { height: 4px; background: #3b82f6; animation: barProgress 1.5s infinite ease-in-out; }
    @keyframes barProgress { 0% { width: 0%; } 100% { width: 100%; } }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans antialiased" x-data="adminApp" x-cloak>

  <!-- 登入畫面 -->
  <template x-if="!isLoggedIn">
    <div class="fixed inset-0 bg-slate-900 flex items-center justify-center p-6 z-[300]">
      <div class="bg-white rounded-[2.5rem] p-10 max-w-sm w-full shadow-2xl text-center">
        <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-8 text-3xl font-black italic shadow-inner">8</div>
        <h2 class="text-3xl font-black mb-2 tracking-tighter text-slate-800">商家管理登入</h2>
        <p class="text-slate-400 text-sm font-bold uppercase tracking-widest mb-8">Enter Admin Password</p>
        <input type="password" x-model="password" @keyup.enter="tryLogin" placeholder="請輸入密碼" class="w-full border border-slate-100 p-5 rounded-2xl mb-6 bg-slate-50 font-bold text-center outline-none focus:ring-4 focus:ring-blue-100 transition text-lg">
        <button @click="tryLogin" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-200 hover:bg-blue-700 transition active:scale-95" :disabled="loading">
          <span x-show="!loading">啟動管理面板</span>
          <span x-show="loading" class="flex items-center justify-center gap-2"><svg class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></svg> 驗證中</span>
        </button>
      </div>
    </div>
  </template>

  <!-- 加載動畫 (與前台一致) -->
  <div x-show="submitting" class="fixed inset-0 z-[150] no-print">
    <div class="loading-bar w-full absolute top-0 left-0"></div>
    <div class="absolute inset-0 bg-white/70 backdrop-blur-sm flex flex-col items-center justify-center text-center">
       <div class="w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-6"></div>
       <p class="font-black text-blue-600 tracking-tight">正在同步雲端資料庫...</p>
    </div>
  </div>

  <!-- 主內容區 -->
  <template x-if="isLoggedIn">
    <div class="max-w-6xl mx-auto p-4 md:p-8 pb-24">
      <div class="flex justify-between items-center mb-10">
        <div>
          <h1 class="text-3xl font-black text-slate-800 tracking-tighter">822 商家控制台</h1>
          <div class="flex items-center gap-2 text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">
             <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> 連線中 (Connected)
          </div>
        </div>
        <div class="flex gap-3">
           <button @click="refresh" class="bg-white p-3 rounded-xl border border-slate-200 text-slate-400 hover:text-blue-600 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>
           <button @click="logout" class="bg-white px-4 py-2 rounded-xl border border-slate-200 text-red-400 font-bold text-xs hover:bg-red-50 transition">登出</button>
        </div>
      </div>

      <!-- 統計與排行 -->
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-10">
        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">總有效訂單</p><p class="text-3xl font-black mt-1" x-text="stats.totalOrders"></p></div>
        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><p class="text-[10px] text-blue-400 font-black uppercase tracking-widest">預估營收</p><p class="text-3xl font-black mt-1 text-blue-600" x-text="'$' + stats.totalRevenue"></p></div>
        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"><p class="text-[10px] text-emerald-400 font-black uppercase tracking-widest">已收現金</p><p class="text-3xl font-black mt-1 text-emerald-600" x-text="'$' + stats.paidRevenue"></p></div>
        <div class="bg-slate-900 p-6 rounded-3xl shadow-xl text-white">
           <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-3">🔥 熱銷排行 Top 3</p>
           <template x-for="(rank, idx) in stats.ranking.slice(0,3)" :key="idx">
              <div class="flex justify-between text-xs mb-1.5 font-bold">
                 <span x-text="(idx+1) + '. ' + rank[0]"></span>
                 <span class="text-blue-400" x-text="rank[1] + '份'"></span>
              </div>
           </template>
        </div>
      </div>

      <!-- 切換頁籤與列表 -->
      <div class="mb-8 flex gap-8 border-b border-slate-200">
        <button @click="activeTab = 'orders'" class="pb-4 px-1 font-black text-sm transition" :class="activeTab === 'orders' ? 'border-b-4 border-blue-600 text-blue-600' : 'text-slate-400'">訂單管理</button>
        <button @click="activeTab = 'products'" class="pb-4 px-1 font-black text-sm transition" :class="activeTab === 'products' ? 'border-b-4 border-blue-600 text-blue-600' : 'text-slate-400'">品項配置</button>
      </div>

      <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden">
        <!-- 訂單列表 (包含商家取消原因顯示) -->
        <div x-show="activeTab === 'orders'">
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead class="bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <tr><th class="p-6">訂購人 / 資訊</th><th class="p-6">購買內容</th><th class="p-6">金額</th><th class="p-6">狀態 / 原因</th><th class="p-6 text-right">操作</th></tr>
              </thead>
              <tbody class="divide-y text-sm font-medium">
                <template x-for="o in orders" :key="o.id">
                  <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="p-6">
                      <p class="font-black text-slate-800" x-text="o.name"></p>
                      <p class="text-[10px] text-slate-400 font-bold" x-text="o.class + '班 ' + (o.seat ? o.seat+'號' : '(老師)')"></p>
                    </td>
                    <td class="p-6">
                      <template x-for="i in o.items"><span class="inline-block bg-blue-50 text-blue-600 rounded px-1.5 py-0.5 mr-1 mb-1 border border-blue-100 text-[10px] font-black" x-text="i.name + 'x' + i.quantity"></span></template>
                    </td>
                    <td class="p-6 font-black" x-text="'$' + o.total"></td>
                    <td class="p-6">
                      <span class="px-2.5 py-1 rounded-full text-[9px] font-black uppercase tracking-wider" 
                            :class="{ 'bg-amber-100 text-amber-600': o.status === 'pending', 'bg-emerald-100 text-emerald-600': o.status === 'paid', 'bg-red-100 text-red-600': o.status === 'cancelled' }" x-text="o.status"></span>
                      <p x-show="o.cancelReason" class="text-[10px] text-red-400 mt-1 italic font-bold" x-text="'取消: ' + o.cancelReason"></p>
                    </td>
                    <td class="p-6 text-right">
                       <div class="flex flex-col items-end gap-2">
                          <div class="flex gap-3 items-center">
                             <button @click="viewReceipt(o)" class="text-blue-600 font-black underline text-[11px] uppercase tracking-tighter">檢視</button>
                             <button x-show="o.status === 'pending'" @click="updateStatus(o.id, 'paid')" class="bg-emerald-500 text-white text-[10px] px-4 py-1.5 rounded-xl font-black shadow-lg shadow-emerald-50 transition active:scale-95">收款</button>
                          </div>
                          <button x-show="o.status === 'pending'" @click="targetOrder = o; showCancelModal = true" class="text-red-400 hover:text-red-600 font-bold text-[10px] underline">商家取消</button>
                       </div>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>

        <!-- 商品配置 (包含新增按鈕) -->
        <div x-show="activeTab === 'products'" class="p-6" x-cloak>
           <button @click="openAddModal" class="w-full mb-6 py-4 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-black hover:bg-slate-50 transition text-sm">＋ 增加新餐點</button>
           <div class="grid gap-4">
             <template x-for="p in products" :key="p.id">
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                   <div>
                     <p class="font-black text-slate-800" x-text="p.name"></p>
                     <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest" x-text="p.category + ' / 庫存: ' + p.stock"></p>
                   </div>
                   <div class="flex gap-4 items-center">
                      <span class="font-black text-blue-600">$<span x-text="p.price"></span></span>
                      <button @click="openEditModal(p)" class="text-slate-400 hover:text-blue-600 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
                      <button @click="deleteProduct(p.id)" class="text-slate-400 hover:text-red-500 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                   </div>
                </div>
             </template>
           </div>
        </div>
      </div>
    </div>
  </template>

  <!-- 彈窗組件 (收據、取消、編輯) - 代碼保持原樣 -->
  <!-- [此處收錄收據預覽、取消原因、編輯商品等 Modal，與上個版本一致] -->

</body>
</html>
