<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 放寬 CSP 限制以解決腳本與圖片載入問題 -->
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com https://www.googletagmanager.com; img-src 'self' data: blob: *; worker-src 'self' blob: *; connect-src 'self' https://script.google.com https://script.googleusercontent.com;">
  
  <title>園遊會美食訂購</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbySm6lzRRBA30Ga0qQN_I4mi0szqMXQNwKzTJmfwRLVeree-A_VqDGudrmRTu7wUGc2/exec';

    document.addEventListener('alpine:init', () => {
      Alpine.data('fairApp', () => ({
        view: 'shop', 
        loading: true,
        cart: [],
        products: [],
        orderHistory: [],
        orderForm: { name: '', phone: '', identity: 'student', class: '', seat: '' },
        activeReceipt: null,
        successShow: false,
        submitting: false,
        showReceiptModal: false,
        
        // 取消訂單相關
        showCancelModal: false,
        cancelReason: '',
        targetOrder: null,

        async init() {
          const savedHistory = localStorage.getItem('fair_orders');
          if (savedHistory) this.orderHistory = JSON.parse(savedHistory);
          await this.loadProducts();
        },

        async loadProducts() {
          this.loading = true;
          try {
            const res = await fetch(`${API_URL}?action=getAppData`);
            const json = await res.json();
            if (json.status === 'success') this.products = json.data.products || [];
          } catch (err) { console.error("載入失敗:", err); } 
          finally { this.loading = false; }
        },

        addToCart(p) {
          const exist = this.cart.find(i => i.id === p.id);
          if (exist) exist.quantity++;
          else this.cart.push({ ...p, quantity: 1 });
        },

        removeFromCart(index) { this.cart.splice(index, 1); },
        get cartTotal() { return this.cart.reduce((s, i) => s + (i.price * i.quantity), 0); },

        async checkout() {
          if (!this.orderForm.name || !this.orderForm.phone || !this.orderForm.class) { alert('請填寫完整資訊'); return; }
          if (this.orderForm.identity === 'student' && !this.orderForm.seat) { alert('請填寫座號'); return; }
          if (this.cart.length === 0) return;

          this.submitting = true;
          try {
            await fetch(API_URL, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify({ action: 'submitOrder', data: { ...this.orderForm, items: this.cart, total: this.cartTotal } })
            });
            
            const newOrder = {
              id: 'ORD' + Date.now(),
              ...this.orderForm,
              items: JSON.parse(JSON.stringify(this.cart)),
              total: this.cartTotal,
              timestamp: new Date().toLocaleString('zh-TW'),
              status: 'pending'
            };
            
            this.orderHistory.unshift(newOrder);
            localStorage.setItem('fair_orders', JSON.stringify(this.orderHistory));
            this.successShow = true;
            this.cart = [];
          } catch (err) { alert("提交訂單時發生連線錯誤"); } 
          finally { this.submitting = false; }
        },

        async performCancel() {
          if (!this.cancelReason.trim()) { alert("請輸入取消原因"); return; }
          this.submitting = true;
          try {
            await fetch(API_URL, {
              method: 'POST',
              mode: 'no-cors',
              body: JSON.stringify({ action: 'cancelOrder', orderId: this.targetOrder.id, reason: this.cancelReason })
            });
            
            // 更新本地顯示
            const idx = this.orderHistory.findIndex(o => o.id === this.targetOrder.id);
            if (idx !== -1) {
              this.orderHistory[idx].status = 'cancelled';
              this.orderHistory[idx].cancelReason = this.cancelReason;
              localStorage.setItem('fair_orders', JSON.stringify(this.orderHistory));
            }
            
            this.showCancelModal = false;
            this.cancelReason = '';
          } catch (err) { alert("取消失敗"); }
          finally { this.submitting = false; }
        },

        printReceipt(order) {
          this.activeReceipt = order;
          this.showReceiptModal = true;
        }
      }));
    });
  </script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    @keyframes barProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }
    .loading-bar {
      height: 4px;
      background: #3b82f6;
      animation: barProgress 2s infinite ease-in-out;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900" x-data="fairApp" x-cloak>
  <!-- 全局加載條 -->
  <div x-show="submitting" class="fixed top-0 left-0 w-full z-[100] no-print">
    <div class="loading-bar"></div>
    <div class="absolute inset-0 bg-white/50 backdrop-blur-sm h-screen flex flex-col items-center justify-center">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent mb-4"></div>
      <p class="font-bold text-blue-600">正在處理請求，請稍候...</p>
    </div>
  </div>

  <nav class="bg-white border-b sticky top-0 z-50 no-print">
    <div class="max-w-4xl mx-auto px-4 h-16 flex justify-between items-center">
      <h1 class="font-black text-blue-600 text-xl tracking-tighter">822 園遊會系統</h1>
      <div class="flex gap-6 font-bold text-sm">
        <button @click="view = 'shop'" :class="view==='shop'?'text-blue-600':'text-slate-400 hover:text-slate-600 transition'">點餐</button>
        <button @click="view = 'history'" :class="view==='history'?'text-blue-600':'text-slate-400 hover:text-slate-600 transition'">紀錄</button>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto p-4 md:p-8 no-print">
    <!-- 商品列表區 -->
    <template x-if="view === 'shop'">
      <div class="grid md:grid-cols-5 gap-8">
        <div class="md:col-span-3 space-y-4">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-slate-800">選擇美食</h2>
            <div x-show="loading" class="animate-pulse text-xs text-slate-400">同步商品中...</div>
          </div>
          <template x-for="p in products" :key="p.id">
            <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center hover:shadow-xl hover:-translate-y-1 transition duration-300">
              <div>
                <p class="font-bold text-lg text-slate-800" x-text="p.name"></p>
                <p class="text-xs text-slate-400 mt-1" x-text="p.description"></p>
                <div class="flex items-center gap-2 mt-2">
                  <span class="text-blue-600 font-black text-xl">$<span x-text="p.price"></span></span>
                  <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded text-slate-500 font-bold" x-text="p.category"></span>
                </div>
              </div>
              <button @click="addToCart(p)" class="bg-slate-900 text-white w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-blue-600 shadow-lg shadow-slate-200 transition">＋</button>
            </div>
          </template>
        </div>

        <!-- 購物車 -->
        <div class="md:col-span-2 space-y-4">
          <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 sticky top-24 shadow-sm">
            <h3 class="font-black text-lg mb-6">我的清單</h3>
            <div class="space-y-3 mb-6 max-h-48 overflow-auto">
              <template x-for="(i, idx) in cart">
                <div class="flex justify-between text-sm items-center">
                  <span class="font-medium" x-text="i.name + ' x' + i.quantity"></span>
                  <div class="flex items-center gap-3">
                    <span class="font-black">$<span x-text="i.price*i.quantity"></span></span>
                    <button @click="removeFromCart(idx)" class="text-red-400 hover:text-red-600">✕</button>
                  </div>
                </div>
              </template>
              <p x-show="cart.length===0" class="text-slate-300 italic text-center py-6 text-sm">目前還沒有點餐喔</p>
            </div>
            <div class="border-t pt-4 mb-8 flex justify-between items-end">
              <span class="text-xs text-slate-400 font-bold uppercase">總計金額</span>
              <span class="font-black text-3xl text-blue-600">$<span x-text="cartTotal"></span></span>
            </div>
            
            <div class="space-y-4">
              <div class="flex gap-1 bg-slate-100 p-1 rounded-2xl">
                <button @click="orderForm.identity='student'" class="flex-1 py-2 rounded-xl text-xs font-bold transition" :class="orderForm.identity==='student'?'bg-white shadow text-slate-800':'text-slate-400'">學生</button>
                <button @click="orderForm.identity='teacher'" class="flex-1 py-2 rounded-xl text-xs font-bold transition" :class="orderForm.identity==='teacher'?'bg-white shadow text-slate-800':'text-slate-400'">老師</button>
              </div>
              <input type="text" x-model="orderForm.name" placeholder="姓名" class="w-full border border-slate-200 p-3 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-blue-600 bg-slate-50/50">
              <div class="flex gap-2">
                <input type="text" x-model="orderForm.class" placeholder="班級(如:822)" class="w-1/2 border border-slate-200 p-3 rounded-2xl text-sm bg-slate-50/50">
                <input x-show="orderForm.identity==='student'" type="number" x-model="orderForm.seat" placeholder="座號" class="w-1/2 border border-slate-200 p-3 rounded-2xl text-sm bg-slate-50/50">
              </div>
              <input type="text" x-model="orderForm.phone" placeholder="電話號碼" class="w-full border border-slate-200 p-3 rounded-2xl text-sm bg-slate-50/50">
              <button @click="checkout" :disabled="submitting || cart.length===0" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-blue-100 transition hover:bg-blue-700 disabled:opacity-50">確認預訂</button>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- 歷史紀錄區 -->
    <template x-if="view === 'history'">
      <div class="space-y-4">
        <h2 class="text-2xl font-black text-slate-800 mb-6">訂單歷史紀錄</h2>
        <template x-for="h in orderHistory" :key="h.id">
          <div class="bg-white p-6 rounded-[2rem] border border-slate-100 flex justify-between items-center shadow-sm">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1">
                <span class="font-mono text-[10px] text-slate-300" x-text="h.id"></span>
                <span x-show="h.status === 'cancelled'" class="bg-red-100 text-red-600 text-[9px] font-bold px-2 py-0.5 rounded-full uppercase">已取消</span>
              </div>
              <p class="font-bold text-slate-700" x-text="h.timestamp"></p>
              <p class="text-sm text-slate-500 font-medium">$<span x-text="h.total"></span> - <span x-text="h.items.length"></span> 個品項</p>
              <p x-show="h.cancelReason" class="text-[10px] text-red-400 mt-1 italic" x-text="'原因：' + h.cancelReason"></p>
            </div>
            <div class="flex gap-2">
               <button x-show="h.status !== 'cancelled'" @click="targetOrder = h; showCancelModal = true" class="bg-white border border-red-100 text-red-500 px-4 py-2 rounded-xl font-bold text-xs hover:bg-red-50 transition">取消訂單</button>
               <button @click="printReceipt(h)" class="bg-blue-50 text-blue-600 px-5 py-2 rounded-xl font-bold text-xs hover:bg-blue-100 transition">收據 PDF</button>
            </div>
          </div>
        </template>
        <div x-show="orderHistory.length===0" class="text-slate-300 text-center py-24 flex flex-col items-center">
           <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
           <p class="font-bold">目前沒有任何訂購紀錄喔</p>
        </div>
      </div>
    </template>
  </main>

  <!-- 取消訂單彈窗 -->
  <div x-show="showCancelModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-[70] p-4" x-transition x-cloak>
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl">
      <h3 class="text-xl font-black mb-2 text-slate-800">取消訂單</h3>
      <p class="text-xs text-slate-400 mb-6 uppercase tracking-widest font-bold">請提供取消原因以完成申請</p>
      <textarea x-model="cancelReason" rows="3" placeholder="例如：點錯了、不買了..." class="w-full border border-slate-200 rounded-2xl p-4 text-sm outline-none focus:ring-2 focus:ring-red-500 bg-slate-50"></textarea>
      <div class="grid grid-cols-2 gap-4 mt-8">
        <button @click="showCancelModal = false" class="py-3 font-bold text-slate-400 hover:bg-slate-50 rounded-2xl transition">回上一頁</button>
        <button @click="performCancel" class="py-3 bg-red-500 text-white font-black rounded-2xl shadow-lg shadow-red-100 hover:bg-red-600 transition">確定取消</button>
      </div>
    </div>
  </div>

  <!-- 收據預覽視窗 -->
  <div x-show="showReceiptModal" x-transition class="fixed inset-0 bg-slate-900/90 flex items-center justify-center z-[80] p-4 no-print" x-cloak>
    <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full relative shadow-2xl border-t-8 border-blue-600">
      <div id="print-area" class="p-2 bg-white">
        <div class="border-4 border-double border-slate-200 p-6">
          <h2 class="text-center font-black text-2xl mb-1 tracking-tighter">822 園遊會收據</h2>
          <p class="text-center text-[9px] text-slate-400 mb-6 uppercase tracking-[0.2em] font-bold">Order Receipt / Confirmation</p>
          <div class="text-[11px] space-y-1.5 mb-6 border-b border-dashed border-slate-300 pb-4 font-medium">
            <div class="flex justify-between"><span>單號 Order ID</span><span class="font-mono font-bold" x-text="activeReceipt?.id"></span></div>
            <div class="flex justify-between"><span>客戶姓名 Name</span><span class="font-bold" x-text="activeReceipt?.name"></span></div>
            <div class="flex justify-between"><span>班級 Class</span><span class="font-bold" x-text="activeReceipt?.class + ' 班 ' + (activeReceipt?.seat ? activeReceipt?.seat + ' 號' : '')"></span></div>
            <div class="flex justify-between"><span>時間 Time</span><span class="text-slate-400" x-text="activeReceipt?.timestamp"></span></div>
          </div>
          <div class="space-y-2 mb-6">
            <template x-for="i in activeReceipt?.items">
              <div class="flex justify-between text-xs italic font-semibold">
                <span x-text="i.name + ' x ' + i.quantity"></span>
                <span x-text="'$' + i.price*i.quantity"></span>
              </div>
            </template>
          </div>
          <div class="border-t-2 border-slate-800 pt-3 flex justify-between items-end mb-8">
            <span class="text-xs font-bold">總金額 TOTAL</span>
            <span class="font-black text-2xl text-blue-600 tracking-tighter" x-text="'$' + activeReceipt?.total"></span>
          </div>
          <p class="text-center text-[10px] text-slate-400 font-black leading-tight">請於 3/21 前至 822 班完成繳費<br>以免訂單失效，謝謝支持！</p>
        </div>
      </div>
      <div class="mt-8 grid grid-cols-2 gap-4 no-print">
        <button @click="showReceiptModal = false" class="py-3 bg-slate-100 rounded-2xl font-bold text-slate-500 hover:bg-slate-200 transition text-sm">關閉視窗</button>
        <button @click="window.print()" class="py-3 bg-blue-600 text-white rounded-2xl font-black shadow-xl shadow-blue-200 hover:bg-blue-700 transition text-sm">列印收據</button>
      </div>
    </div>
  </div>

  <!-- 成功預訂彈窗 -->
  <div x-show="successShow" x-transition class="fixed inset-0 bg-blue-600/95 flex items-center justify-center z-[100] p-4 no-print" x-cloak>
    <div class="text-center text-white max-w-sm w-full">
      <div class="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-8 text-5xl">🍕</div>
      <h3 class="text-4xl font-black mb-4 tracking-tighter text-white">預訂成功！</h3>
      <p class="text-blue-100 mb-10 leading-relaxed font-bold">
        太棒了！訂單已記錄。請務必在 <span class="bg-white text-blue-600 px-2 py-1 rounded mx-1">3/21 前</span> 前往 <span class="bg-white text-blue-600 px-2 py-1 rounded mx-1">822 班教室</span> 繳費。
      </p>
      <button @click="successShow = false; view = 'history'" class="w-full bg-white text-blue-600 py-5 rounded-3xl font-black text-xl shadow-2xl hover:bg-blue-50 transition">好的，查看紀錄</button>
    </div>
  </div>
</body>
</html>
